AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: cloud-gate-monitor

Parameters:
  AlertPhoneNumber:
    Type: String
    Description: "E.164 format e.g. +14165551234"
  FailedAttemptThreshold:
    Type: Number
    Default: 1
  FailedAttemptWindowMinutes:
    Type: Number
    Default: 60
  TTLockClientSecret:
    Type: String
    NoEcho: true

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    Timeout: 15
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        TABLE_NAME: !Ref EventsTable
        VIDEO_BUCKET: !Ref VideoBucket
        CLOUDFRONT_DOMAIN: !GetAtt Distribution.DomainName

Resources:

  # ── S3 ─────────────────────────────────────────────────────────────────────
  VideoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "cgm-video-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: clips-7-day
            Status: Enabled
            Prefix: clips/
            ExpirationInDays: 7
          - Id: live-1-day
            Status: Enabled
            Prefix: live/
            ExpirationInDays: 1

  VideoBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VideoBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${VideoBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  # ── CloudFront ──────────────────────────────────────────────────────────────
  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: cgm-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: cloud-gate-monitor
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Origins:
          - Id: s3
            DomainName: !GetAtt VideoBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !Ref OAC
        DefaultCacheBehavior:
          TargetOriginId: s3
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD, OPTIONS]
          Compress: true
        CacheBehaviors:
          # FIX: live/* must be listed BEFORE live/*.m3u8 is evaluated — CloudFront
          # matches most-specific pattern first, so live/*.m3u8 still wins for
          # playlists. This catch-all for live/* (segments + any other live path)
          # uses CachingDisabled and has NO custom error response override, so
          # 403/404s on cycled-out .ts segments are passed through to hls.js as
          # real errors instead of being swallowed as 200 index.html responses.
          - PathPattern: "live/*"
            TargetOriginId: s3
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad   # CachingDisabled
            AllowedMethods: [GET, HEAD, OPTIONS]
          - PathPattern: "live/*.m3u8"
            TargetOriginId: s3
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad   # CachingDisabled
            AllowedMethods: [GET, HEAD, OPTIONS]
        # CustomErrorResponses are intentionally scoped only to non-live paths
        # (CloudFront applies them only when no CacheBehavior matches, i.e. the
        # DefaultCacheBehavior — which covers the SPA assets). The live/* behavior
        # above ensures segment/playlist paths never reach this fallback.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  # ── Cognito ─────────────────────────────────────────────────────────────────
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: cgm-users
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      MfaConfiguration: "ON"
      EnabledMfas: [SOFTWARE_TOKEN_MFA]
      Policies:
        PasswordPolicy:
          MinimumLength: 16
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref UserPool
      Domain: !Sub "cgm-${AWS::AccountId}"

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: cgm-dashboard
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      AllowedOAuthFlows: [code]
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes: [openid, email, profile]
      ExplicitAuthFlows: [ALLOW_USER_SRP_AUTH, ALLOW_REFRESH_TOKEN_AUTH]
      CallbackURLs:
        - !Sub "https://${Distribution.DomainName}/callback"
        - "http://localhost:5173/callback"
      LogoutURLs:
        - !Sub "https://${Distribution.DomainName}/"
        - "http://localhost:5173/"
      SupportedIdentityProviders: [COGNITO]
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 7
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  # ── DynamoDB ────────────────────────────────────────────────────────────────
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cgm-events
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - { AttributeName: pk, AttributeType: S }
        - { AttributeName: sk, AttributeType: S }
        - { AttributeName: gsi1pk, AttributeType: S }
        - { AttributeName: gsi1sk, AttributeType: S }
      KeySchema:
        - { AttributeName: pk, KeyType: HASH }
        - { AttributeName: sk, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - { AttributeName: gsi1pk, KeyType: HASH }
            - { AttributeName: gsi1sk, KeyType: RANGE }
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── SSM params (edit live without redeploying) ──────────────────────────────
  ThresholdParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /cgm/threshold
      Type: String
      Value: !Sub "${FailedAttemptThreshold}"

  WindowParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /cgm/window-minutes
      Type: String
      Value: !Sub "${FailedAttemptWindowMinutes}"

  PhoneParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /cgm/phone
      Type: String
      Value: !Ref AlertPhoneNumber

  SecretParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /cgm/ttlock-secret
      Type: String
      Value: !Ref TTLockClientSecret

  # ── API Gateway ─────────────────────────────────────────────────────────────
  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: api
      CorsConfiguration:
        AllowOrigins:
          - !Sub "https://${Distribution.DomainName}"
          - "http://localhost:5173"
        AllowHeaders: [Authorization, Content-Type]
        AllowMethods: [GET, POST, OPTIONS]
      Auth:
        DefaultAuthorizer: CognitoJwt
        Authorizers:
          CognitoJwt:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience: [!Ref UserPoolClient]

  # ── Lambda: Webhook ─────────────────────────────────────────────────────────
  WebhookFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        EntryPoints: [index.ts]
        External: ["@aws-sdk/*"]
    Properties:
      CodeUri: functions/ttlock-webhook/
      Handler: index.handler
      Environment:
        Variables:
          THRESHOLD_PARAM: /cgm/threshold
          WINDOW_PARAM: /cgm/window-minutes
          PHONE_PARAM: /cgm/phone
          SECRET_PARAM: /cgm/ttlock-secret
          DASHBOARD_URL: !Sub "https://${Distribution.DomainName}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - SSMParameterReadPolicy:
            ParameterName: "cgm/*"
        - Statement:
            - Effect: Allow
              Action: sns:Publish
              Resource: "*"
      Events:
        Post:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /webhook/ttlock
            Method: POST
            Auth:
              Authorizer: NONE

  # ── Lambda: Clip API ────────────────────────────────────────────────────────
  ClipsFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        EntryPoints: [index.ts]
        External: ["@aws-sdk/*"]
    Properties:
      CodeUri: functions/clip-api/
      Handler: index.handler
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref VideoBucket
      Events:
        Get:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /clips
            Method: GET
        GetProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /clips/{proxy+}
            Method: GET

  # ── Lambda: Events API ──────────────────────────────────────────────────────
  EventsFn:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        EntryPoints: [index.ts]
        External: ["@aws-sdk/*"]
    Properties:
      CodeUri: functions/events-api/
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventsTable
      Events:
        Get:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /events
            Method: GET
        GetSummary:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /events/summary
            Method: GET

  # ── IoT Core ────────────────────────────────────────────────────────────────
  PiThing:
    Type: AWS::IoT::Thing
    Properties:
      ThingName: cgm-pi

  PiPolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: cgm-pi-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: [iot:Connect, iot:Publish, iot:AssumeRoleWithCertificate]
            Resource: "*"

  PiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cgm-pi-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: credentials.iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PiS3Write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:PutObject, s3:DeleteObject]
                Resource:
                  - !Sub "${VideoBucket.Arn}/clips/*"
                  - !Sub "${VideoBucket.Arn}/live/*"

  PiRoleAlias:
    Type: AWS::IoT::RoleAlias
    Properties:
      RoleAlias: cgm-pi-alias
      RoleArn: !GetAtt PiRole.Arn
      CredentialDurationSeconds: 3600

Outputs:
  DashboardURL:
    Value: !Sub "https://${Distribution.DomainName}"
  ApiURL:
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/api"
  WebhookURL:
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/api/webhook/ttlock"
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  CognitoDomain:
    Value: !Sub "https://cgm-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com"
  VideoBucket:
    Value: !Ref VideoBucket
  IoTThingName:
    Value: !Ref PiThing
  IoTRoleAlias:
    Value: cgm-pi-alias
